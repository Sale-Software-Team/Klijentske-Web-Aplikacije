<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="over" position="start" class="mobile-nav">
    <mat-nav-list>
      <a mat-list-item routerLink="/" (click)="sidenav.close()">
        <mat-icon matListItemIcon>home</mat-icon>
        <span matListItemTitle>Početna</span>
      </a>
      <a mat-list-item routerLink="/toys" (click)="sidenav.close()">
        <mat-icon matListItemIcon>toys</mat-icon>
        <span matListItemTitle>Igračke</span>
      </a>
      <a mat-list-item routerLink="/cart" (click)="sidenav.close()">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Korpa</span>
      </a>
      @if (authService.isLoggedIn$ | async) {
        <a mat-list-item routerLink="/profile" (click)="sidenav.close()">
          <mat-icon matListItemIcon>person</mat-icon>
          <span matListItemTitle>Profil</span>
        </a>
        <a mat-list-item (click)="authService.logout(); sidenav.close()">
          <mat-icon matListItemIcon>logout</mat-icon>
          <span matListItemTitle>Odjavi se</span>
        </a>
      } @else {
        <a mat-list-item routerLink="/login" (click)="sidenav.close()">
          <mat-icon matListItemIcon>login</mat-icon>
          <span matListItemTitle>Prijava</span>
        </a>
        <a mat-list-item routerLink="/register" (click)="sidenav.close()">
          <mat-icon matListItemIcon>person_add</mat-icon>
          <span matListItemTitle>Registracija</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <app-header (toggleSidenav)="sidenav.toggle()"></app-header>
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
    <app-footer></app-footer>
  </mat-sidenav-content>
</mat-sidenav-container>
